# Enable Native Wayland & GPU Acceleration
--ozone-platform-hint=auto
--enable-features=WaylandWindowDecorations,CanvasOopRasterization,VaapiVideoDecodeLinuxGL,VaapiVideoEncoder,Vulkan
--ignore-gpu-blocklist
--enable-gpu-rasterization
--enable-zero-copy

# Disable the large 2.7GB on-device AI model (OptGuideOnDeviceModel)
# This model is used for "Help me write" and "Tab organizer". 
# Disabling it saves 2.7GB of disk space and improves startup time.
--disable-features=OptimizationGuideModelDownloading,OptimizationGuide
